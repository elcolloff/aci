name: Integration PR Review
jobs:
  integration-pr-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: After checkout - examining workspace for attacker-controlled scripts"
        echo "GARALT_DBG: Listing .github/scripts/:"
        ls -la .github/scripts/ 2>/dev/null || echo "GARALT_DBG: .github/scripts/ directory not found"
        echo "GARALT_DBG: Head of integration_detect_changed_files.sh:"
        head -10 .github/scripts/integration_detect_changed_files.sh 2>/dev/null || echo "GARALT_DBG: File not found"
        echo "GARALT_DBG: Head of integration_generate_pr_content.sh:"
        head -10 .github/scripts/integration_generate_pr_content.sh 2>/dev/null || echo "GARALT_DBG: File not found"
        echo "GARALT_DBG: Head of integration_pr_review.py:"
        head -10 .github/scripts/integration_pr_review.py 2>/dev/null || echo "GARALT_DBG: File not found"
      continue-on-error: true
    - name: Detect changed files
      id: changed-files
      run: |
        # Execute the script and redirect its output to $GITHUB_OUTPUT
        bash .github/scripts/integration_detect_changed_files.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
    - name: Get PR title and body
      id: pr-info
      if: steps.changed-files.outputs.skip != 'true'
      run: |
        echo "title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
        echo "body<<BODY_DELIMITER" >> $GITHUB_OUTPUT
        echo "${{ github.event.pull_request.body }}" >> $GITHUB_OUTPUT
        echo "BODY_DELIMITER" >> $GITHUB_OUTPUT
    - name: Generate file content for Claude
      id: file-content
      if: steps.changed-files.outputs.skip != 'true'
      run: |
        # Generate PR content using our script
        bash .github/scripts/integration_generate_pr_content.sh "${{ steps.pr-info.outputs.title }}" "${{ steps.pr-info.outputs.body }}" "${{ steps.changed-files.outputs.changed_files }}" "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: About to execute attacker-controlled Python script with ANTHROPIC_API_KEY"
        if [ -n "${ANTHROPIC_API_KEY}" ]; then
          echo "GARALT_DBG: ANTHROPIC_API_KEY is SET (length: ${#ANTHROPIC_API_KEY})"
        else
          echo "GARALT_DBG: ANTHROPIC_API_KEY is NOT SET"
        fi
        if [ -f pr_content.txt ]; then
          echo "GARALT_DBG: pr_content.txt exists (size: $(wc -c < pr_content.txt) bytes)"
        else
          echo "GARALT_DBG: pr_content.txt does not exist"
        fi
        echo "GARALT_DBG: Head of integration_pr_review.py (attacker-controlled):"
        head -10 .github/scripts/integration_pr_review.py 2>/dev/null || echo "GARALT_DBG: File not found"
        echo "GARALT_DBG: Listing workspace .py and .sh files:"
        find . -maxdepth 3 -name '*.py' -o -name '*.sh' 2>/dev/null | head -20 || echo "GARALT_DBG: find failed"
      continue-on-error: true
    - name: Run Claude Code Review
      id: claude-review
      if: steps.changed-files.outputs.skip != 'true'
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: |
        # Install the Anthropic CLI
        pip install anthropic

        # Run our Python script
        python .github/scripts/integration_pr_review.py
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    paths:
    - apps/**
